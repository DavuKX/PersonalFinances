# ─── Backend Services CI/CD ────────────────────────────────────────────────────
# On push to main: build, test, push Docker images to ECR, deploy to EKS.
name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "api-gateway/**"
      - "user-service/**"
      - "transaction-service/**"
      - "wallet-service/**"
      - "analytics-service/**"
      - "k8s/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  # ── Detect which services changed ──────────────────────────────────────────
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api-gateway:
              - 'api-gateway/**'
            user-service:
              - 'user-service/**'
            transaction-service:
              - 'transaction-service/**'
            wallet-service:
              - 'wallet-service/**'
            analytics-service:
              - 'analytics-service/**'

  # ── Build, Test & Push ─────────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.service }}
    needs: changes
    if: needs.changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run Tests
        working-directory: ${{ matrix.service }}
        run: |
          chmod +x mvnw
          ./mvnw verify -B

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: sha-${{ github.sha }}
        working-directory: ${{ matrix.service }}
        run: |
          IMAGE_NAME=$ECR_REGISTRY/personalfinance/${{ matrix.service }}
          docker build -t $IMAGE_NAME:$IMAGE_TAG -t $IMAGE_NAME:latest .
          docker push $IMAGE_NAME:$IMAGE_TAG
          docker push $IMAGE_NAME:latest

  # ── Deploy to EKS ─────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    needs: build
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ env.AWS_REGION }}

      - name: Get Terraform outputs for endpoint substitution
        id: endpoints
        run: |
          echo "rds_address=${{ secrets.RDS_ADDRESS }}" >> "$GITHUB_OUTPUT"
          echo "redis_endpoint=${{ secrets.REDIS_ENDPOINT }}" >> "$GITHUB_OUTPUT"
          echo "mq_endpoint=${{ secrets.MQ_ENDPOINT }}" >> "$GITHUB_OUTPUT"
          echo "aws_account_id=$(aws sts get-caller-identity --query Account --output text)" >> "$GITHUB_OUTPUT"

      - name: Substitute placeholders in K8s manifests
        env:
          AWS_ACCOUNT_ID: ${{ steps.endpoints.outputs.aws_account_id }}
          RDS_ADDRESS: ${{ steps.endpoints.outputs.rds_address }}
          REDIS_ENDPOINT: ${{ steps.endpoints.outputs.redis_endpoint }}
          MQ_ENDPOINT: ${{ steps.endpoints.outputs.mq_endpoint }}
          IMAGE_TAG: sha-${{ github.sha }}
        run: |
          # ConfigMaps — replace endpoint placeholders
          find k8s/configmaps -name "*.yml" -exec sed -i \
            "s|__RDS_ENDPOINT__|${RDS_ADDRESS}|g; \
             s|__REDIS_ENDPOINT__|${REDIS_ENDPOINT}|g; \
             s|__MQ_ENDPOINT__|${MQ_ENDPOINT}|g" {} \;

          # Deployments — replace AWS account + region + image tag
          find k8s/deployments -name "*.yml" -exec sed -i \
            "s|<AWS_ACCOUNT_ID>|${AWS_ACCOUNT_ID}|g; \
             s|<REGION>|${AWS_REGION}|g; \
             s|:latest|:${IMAGE_TAG}|g" {} \;

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/namespace.yml
          kubectl apply -f k8s/external-secrets/
          kubectl apply -f k8s/configmaps/
          kubectl apply -f k8s/deployments/
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/ingress/

      - name: Wait for rollouts
        run: |
          for svc in api-gateway user-service transaction-service wallet-service analytics-service; do
            kubectl rollout status deployment/$svc \
              -n personalfinance --timeout=300s || true
          done

      - name: Verify pods
        run: kubectl get pods -n personalfinance

