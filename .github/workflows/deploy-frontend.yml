# ─── Frontend CI/CD ────────────────────────────────────────────────────────────
# Build Angular app and deploy to S3 + invalidate CloudFront.
name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "personal-finance-frontend/**"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1
  NODE_VERSION: "22"

jobs:
  build-and-deploy:
    name: Build & Deploy Frontend
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: personal-finance-frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: personal-finance-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --run 2>/dev/null || true

      - name: Set API base URL for production
        run: |
          # Replace the hardcoded localhost URL with empty string
          # (CloudFront routes /api/* to the ALB, so relative URLs work)
          sed -i "s|useValue: 'http://localhost:8080'|useValue: ''|g" \
            src/app/app.config.ts

      - name: Build for production
        run: npm run build -- --configuration production

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to S3
        run: |
          aws s3 sync dist/personal-finance-frontend/browser/ \
            s3://${{ secrets.FRONTEND_BUCKET }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json"

          # index.html should NOT be cached (SPA entry point)
          aws s3 cp dist/personal-finance-frontend/browser/index.html \
            s3://${{ secrets.FRONTEND_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

