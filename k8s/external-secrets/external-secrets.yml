# ─── ExternalSecret: db-secrets ────────────────────────────────────────────────
# Syncs DB credentials from AWS Secrets Manager → K8s Secret "db-secrets"
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: db-secrets
  namespace: personalfinance
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: db-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_USERNAME
      remoteRef:
        key: personalfinance/prod/db-credentials
        property: DB_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: personalfinance/prod/db-credentials
        property: DB_PASSWORD
---
